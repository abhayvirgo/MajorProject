apiVersion: v1
kind: Namespace
metadata:
  name: finbert
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: finbert-code-config
  namespace: finbert
data:
  app.py: |
    import os
    os.environ["CUDA_VISIBLE_DEVICES"] = ""
    import torch
    from transformers import pipeline
    from flask import Flask, request, jsonify

    print(f"PyTorch engine initialized. Version: {torch.__version__}")
    print("Loading FinBERT Pipeline...")
    pipe = pipeline("text-classification", model="ProsusAI/finbert", device=-1)
    print("FinBERT Pipeline loaded successfully!")

    app = Flask(__name__)

    @app.route("/", methods=["GET"])
    def health():
        return jsonify({"status": "healthy", "model": "FinBERT engine is ready"}), 200

    @app.route("/v1/inference", methods=["POST"])
    def infer():
        data = request.json or {}
        inputs = data.get("request", [])
        if not inputs:
            return jsonify({"error": "Missing request text array"}), 400
        results = pipe(inputs)
        return jsonify(results)

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=5001)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbert-cpu-deployment
  namespace: finbert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finbert-cpu
  template:
    metadata:
      labels:
        app: finbert-cpu
    spec:
      tolerations:
      - operator: "Exists"
        effect: "NoSchedule"
      nodeSelector:
        apps: phi-4
      volumes:
      - name: code-volume
        configMap:
          name: finbert-code-config
      containers:
      - name: finbert-api
        image: "docker.io/library/python:3.11-slim"
        command:
        - "sh"
        - "-c"
        - |
          mkdir -p /app/tmp
          cp /config/app.py /app/app.py
          export TMPDIR=/app/tmp
          export PIP_TMPDIR=/app/tmp
          export PIP_CACHE_DIR=/app/tmp
          python -m pip install --no-cache-dir torch transformers flask
          rm -rf /app/tmp
          python /app/app.py
        volumeMounts:
        - name: code-volume
          mountPath: /config
        ports:
        - containerPort: 5001
        resources:
          requests:
            cpu: "1000m"
            memory: "2.5Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: finbert-internal-svc
  namespace: finbert
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5001
    protocol: TCP
  selector:
    app: finbert-cpu
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: finbert-ui-config
  namespace: finbert
data:
  ui.py: |
    import streamlit as st
    import requests

    st.set_page_config(page_title="FinBERT Sentiment", page_icon="📊", layout="wide")
    st.title("📊 Major ProjectFinBERT Financial Sentiment Analyzer")

    # FIXED: Uses short local domain layout to fix the CoreDNS NameResolutionError
    BACKEND_URL = "http://finbert-internal-svc/v1/inference"

    user_input = st.text_area("Enter financial statements (one per line):", value="Company revenue increased by fifteen percent.\nThe stock plummeted following poor guidance.")

    if st.button("Analyze Sentiment", type="primary"):
        headlines = [line.strip() for line in user_input.split("\n") if line.strip()]
        if headlines:
            with st.spinner("Processing..."):
                try:
                    response = requests.post(BACKEND_URL, json={"request": headlines}, timeout=30)
                    if response.status_code == 200:
                        st.write(response.json())
                    else:
                        st.error(f"Error: {response.text}")
                except Exception as e:
                    st.error(f"Cannot reach backend: {e}")
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbert-ui-deployment
  namespace: finbert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finbert-ui
  template:
    metadata:
      labels:
        app: finbert-ui
    spec:
      tolerations:
      - operator: "Exists"
        effect: "NoSchedule"
      nodeSelector:
        apps: phi-4
      volumes:
      - name: ui-code-volume
        configMap:
          name: finbert-ui-config
      containers:
      - name: streamlit-ui
        image: "docker.io/library/python:3.11-slim"
        command:
        - "sh"
        - "-c"
        - |
          mkdir -p /app
          cp /config/ui.py /app/ui.py
          pip install --no-cache-dir streamlit requests
          streamlit run /app/ui.py --server.port=8501 --server.address=0.0.0.0
        volumeMounts:
        - name: ui-code-volume
          mountPath: /config
        ports:
        - containerPort: 8501
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: finbert-ui-public-svc
  namespace: finbert
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8501
    protocol: TCP
  selector:
    app: finbert-ui